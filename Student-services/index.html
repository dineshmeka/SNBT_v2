<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNBT | Smt Nandamuri Basava Tarakuri Memorial Degree College for Women</title>
    <link rel="icon" type="image/x-icon" href="IMAGES/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- <script src="https://code.jquery.com/jquery-1.10.2.js"></script> -->
    <script src="../assets/JS/jquerry.js"></script>
    <link rel="stylesheet" href="../assets/CSS/Nav.css">
    <link rel="stylesheet" href="../assets/CSS/Footer.css">
    <link rel="stylesheet" href="../assets/CSS/Services.css">
    <link rel="stylesheet" href="../assets/CSS/Responsive.css">
    <script>
        $(function () {
            $("#footer-placeholder").load("../Footer.html");
        });
    </script>
</head>

<body>
    <!--Navigation bar-->
    <div id="nav-placeholder">

    </div>


    <div class="services-box">
        <h1 class="heading"><i class="fa fa-graduation-cap"></i> Student Services</h1>
        <div class="services-container" style="height: auto; min-height: 300px; padding: 20px;">
            <!-- Modern Results Scroller -->
            <div class="notice-scroller">
                <div class="scrolling-content">
                    <a href="../Results/index.html">
                        <i class="fa fa-graduation-cap"></i>
                        Degree_III-II Mid Exams June 2026, Results Out! Click Here To Check Now
                        <img src="../assets/IMAGES/new_2.gif" alt="New" style="height: 20px;">
                    </a>
                    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                </div>
            </div>

            <div class="notice-scroller secondary">
                <div class="scrolling-content-delayed">
                    <a href="attendance.html" style="color: inherit; text-decoration: none;">
                        <span><i class="fa fa-clock-o"></i> Check Your Attendence Percentange - Degree students [ <strong>Click Here</strong> ]</span>
                    </a>
                </div>
            </div>

            <div class="notice-scroller secondary">
                <div class="scrolling-content-delayed">
                    <a href="academic-info.html" style="color: inherit; text-decoration: none;">
                        <span><i class="fa fa-info-circle"></i> Check Academic Info of Snbt Students [ <strong>Click Here</strong> ]</span>
                    </a>
                </div>
            </div>

            <div class="notice-scroller" style="background: linear-gradient(135deg, #ff4f01 0%, #131d3b 100%);">
                <div class="scrolling-content">
                    <a href="assessment.html" style="color: #fff; text-decoration: none;">
                        <span><i class="fa fa-bar-chart"></i> <strong>NEW:</strong> Assessment Portal - Internal & External Marks Entry [ <strong>Enter Portal</strong> ]</span>
                    </a>
                </div>
            </div>

            <style>
                .notice-scroller {
                    background: #1a1b37;
                    border: 1px solid rgba(255, 79, 1, 0.3);
                    border-radius: 12px;
                    margin-bottom: 20px;
                    overflow: hidden;
                    white-space: nowrap;
                    padding: 15px;
                    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                }

                .notice-scroller.secondary {
                    background: #131d3b;
                    opacity: 0.8;
                }

                .scrolling-content,
                .scrolling-content-delayed {
                    display: inline-block;
                    animation: marquee-scroll-wide 25s linear infinite;
                    color: #fde428;
                    font-weight: 600;
                    font-size: 1.1rem;
                }

                .scrolling-content-delayed {
                    animation-duration: 35s;
                }

                .scrolling-content a {
                    color: inherit;
                    text-decoration: none;
                    transition: color 0.3s;
                }

                .scrolling-content a:hover {
                    color: #fff;
                    text-decoration: underline;
                }

                @keyframes marquee-scroll-wide {
                    0% {
                        transform: translateX(0);
                    }

                    100% {
                        transform: translateX(-100%);
                    }
                }

                .notice-scroller:hover .scrolling-content,
                .notice-scroller:hover .scrolling-content-delayed {
                    animation-play-state: paused;
                }
            </style>
        </div>
    </div>




    <!--Footer section here-->
    <footer id="footer-placeholder">

    </footer>
    <script src="../assets/JS/main.js"></script>
</body>


</html>
