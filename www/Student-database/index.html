<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNBT | Student Database</title>
    <link rel="icon" type="image/x-icon" href="../IMAGES/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../assets/CSS/Nav.css">
    <link rel="stylesheet" href="../assets/CSS/Footer.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .dashboard-container { max-width: 1000px; margin: 40px auto; background: white; border-radius: 20px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .header { background: #131d3b; color: white; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 28px; }
        .content { padding: 40px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px;}
        .btn { background: #ff4f01; color: white; padding: 15px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-size: 16px;}
        .btn:hover { background: #e64600; box-shadow: 0 5px 15px rgba(255, 79, 1, 0.3); transform: translateY(-2px);}
        
        .data-table { width: 100%; border-collapse: collapse; margin-top: 30px; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05);}
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .data-table th { background: #131d3b; color: white; font-weight: 600;}
        .data-table tr:hover { background-color: #f9f9f9; }
        .back-link { display: inline-block; margin-top: 30px; color: #131d3b; text-decoration: none; font-weight: bold; background: #eee; padding: 10px 20px; border-radius: 8px; transition: 0.3s;}
        .back-link:hover { background: #131d3b; color: white; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <i class="fa fa-users" style="font-size: 40px; margin-bottom: 15px; color: #ff4f01;"></i>
            <h1>Student Database Entry</h1>
        </div>
        <div class="content">
            <h3 style="color: #131d3b; margin-top: 0;">Add New Student</h3>
            <form id="studentForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Student Full Name</label>
                        <input type="text" id="sName" required placeholder="e.g. John Doe">
                    </div>
                    <div class="form-group">
                        <label>Roll Number</label>
                        <input type="text" id="sRoll" required placeholder="e.g. SNBT202301">
                    </div>
                    <div class="form-group">
                        <label>Enrolled Course</label>
                        <select id="sCourse" required>
                            <option value="">-- Choose Course --</option>
                            <option value="B.Sc Computers">B.Sc Computers</option>
                            <option value="B.Com Computers">B.Com Computers</option>
                            <option value="B.A History">B.A History</option>
                            <option value="B.Sc Chemistry">B.Sc Chemistry</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Academic Year</label>
                        <select id="sYear" required>
                            <option value="">-- Choose Year --</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn"><i class="fa fa-plus-circle"></i> Save Student Record</button>
            </form>

            <h3 style="margin-top: 50px; color: #131d3b; border-bottom: 2px solid #ff4f01; padding-bottom: 10px; display: inline-block;">Directory List</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Roll No.</th>
                        <th>Student Name</th>
                        <th>Course Options</th>
                        <th>Year</th>
                        <th style="text-align:center;">Action</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- Data injected via JS -->
                </tbody>
            </table>
            
            <a href="../Staff-login/index.html" class="back-link"><i class="fa fa-arrow-left"></i> Return to Staff Portal</a>
        </div>
    </div>

    <script>
        const formObj = document.getElementById('studentForm');
        const listObj = document.getElementById('dataTableBody');
        const storageKey = 'snbt_staff_students';

        function loadData() {
            const dataStr = localStorage.getItem(storageKey);
            return dataStr ? JSON.parse(dataStr) : [];
        }

        function saveData(data) {
            localStorage.setItem(storageKey, JSON.stringify(data));
        }

        function renderRows() {
            const data = loadData();
            listObj.innerHTML = '';
            
            if(data.length === 0) {
                listObj.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 30px; color:#888;">No records found. Enter a student above.</td></tr>';
                return;
            }

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.roll}</strong></td>
                    <td>${item.name}</td>
                    <td><span style="background:#eaf1ff; color:#131d3b; padding:4px 8px; border-radius:4px; font-size:13px; font-weight:bold;">${item.course}</span></td>
                    <td>${item.year}</td>
                    <td style="text-align:center;">
                        <button onclick="deleteRecord(${index})" style="background:#dc3545; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;" title="Delete">
                            <i class="fa fa-trash"></i>
                        </button>
                    </td>
                `;
                listObj.appendChild(tr);
            });
        }

        function deleteRecord(index) {
            if(confirm('Are you sure you want to remove this student?')) {
                const data = loadData();
                data.splice(index, 1);
                saveData(data);
                renderRows();
            }
        }

        formObj.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newItem = {
                name: document.getElementById('sName').value,
                roll: document.getElementById('sRoll').value,
                course: document.getElementById('sCourse').value,
                year: document.getElementById('sYear').value
            };

            const data = loadData();
            // Optional: check for duplicate roll number
            if(data.some(d => d.roll === newItem.roll)) {
                alert("A student with this Roll Number already exists!");
                return;
            }

            data.unshift(newItem); // Add to beginning
            saveData(data);
            renderRows();
            formObj.reset();
        });

        // Init
        renderRows();
    </script>
</body>
</html>
