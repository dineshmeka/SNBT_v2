<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNBT | Internal Mail</title>
    <link rel="icon" type="image/x-icon" href="../IMAGES/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../assets/CSS/Nav.css">
    <link rel="stylesheet" href="../assets/CSS/Footer.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .dashboard-container { max-width: 1000px; margin: 40px auto; background: white; border-radius: 20px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .header { background: #131d3b; color: white; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 28px; }
        .content { padding: 40px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px;}
        .form-group textarea { resize: vertical; min-height: 120px; }
        
        .btn { background: #ff4f01; color: white; padding: 15px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-size: 16px;}
        .btn:hover { background: #e64600; box-shadow: 0 5px 15px rgba(255, 79, 1, 0.3); transform: translateY(-2px);}
        
        .data-list { list-style: none; padding: 0; margin-top: 30px; }
        .data-list-item { background: #f9f9f9; border-left: 5px solid #ff4f01; padding: 20px; margin-bottom: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .data-list-item h4 { margin: 0 0 10px 0; color: #131d3b; font-size: 18px; }
        .data-list-item p { margin: 0 0 10px 0; color: #555; line-height: 1.5; }
        .data-list-item .meta { font-size: 13px; color: #888; font-weight: 600; }
        .data-list-item .meta span { margin-right: 15px; }
        .delete-btn { position: absolute; top: 15px; right: 15px; background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; transition: 0.3s;}
        .delete-btn:hover { background: #c82333; }

        .back-link { display: inline-block; margin-top: 30px; color: #131d3b; text-decoration: none; font-weight: bold; background: #eee; padding: 10px 20px; border-radius: 8px; transition: 0.3s;}
        .back-link:hover { background: #131d3b; color: white; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <i class="fa fa-comments" style="font-size: 40px; margin-bottom: 15px; color: #ff4f01;"></i>
            <h1>Internal Mail System</h1>
        </div>
        <div class="content">
            <h3 style="color: #131d3b; margin-top: 0;">Compose Message</h3>
            <form id="mailForm">
                <div class="form-grid">
                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label>To (Recipient / Department)</label>
                            <input type="text" id="mTo" required placeholder="e.g. Principal / All Staff">
                        </div>
                        <div>
                            <label>From (Your Name / ID)</label>
                            <input type="text" id="mFrom" required placeholder="e.g. John Doe / 104">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" id="mSubject" required placeholder="Enter message subject">
                    </div>
                    <div class="form-group">
                        <label>Message Content</label>
                        <textarea id="mBody" required placeholder="Type your message here..."></textarea>
                    </div>
                </div>
                <button type="submit" class="btn"><i class="fa fa-paper-plane"></i> Send Internal Mail</button>
            </form>

            <h3 style="margin-top: 50px; color: #131d3b; border-bottom: 2px solid #ff4f01; padding-bottom: 10px; display: inline-block;">Sent & Received Mail</h3>
            <ul class="data-list" id="dataListBody">
                <!-- Data injected via JS -->
            </ul>
            
            <a href="../Staff-login/index.html" class="back-link"><i class="fa fa-arrow-left"></i> Return to Staff Portal</a>
        </div>
    </div>

    <script>
        const formObj = document.getElementById('mailForm');
        const listObj = document.getElementById('dataListBody');
        const storageKey = 'snbt_staff_mail';

        function loadData() {
            const dataStr = localStorage.getItem(storageKey);
            return dataStr ? JSON.parse(dataStr) : [];
        }

        function saveData(data) {
            localStorage.setItem(storageKey, JSON.stringify(data));
        }

        function renderRows() {
            const data = loadData();
            listObj.innerHTML = '';
            
            if(data.length === 0) {
                listObj.innerHTML = '<li style="text-align:center; padding: 30px; color:#888;">No mail messages sent or received.</li>';
                return;
            }

            data.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'data-list-item';
                li.innerHTML = `
                    <button class="delete-btn" onclick="deleteRecord(${index})" title="Delete Mail">
                        <i class="fa fa-trash"></i>
                    </button>
                    <h4>${item.subject}</h4>
                    <p>${item.body.replace(/\n/g, '<br>')}</p>
                    <div class="meta">
                        <span><i class="fa fa-user"></i> From: ${item.from}</span>
                        <span><i class="fa fa-envelope"></i> To: ${item.to}</span>
                        <span><i class="fa fa-clock-o"></i> ${item.timestamp}</span>
                    </div>
                `;
                listObj.appendChild(li);
            });
        }

        function deleteRecord(index) {
            if(confirm('Are you sure you want to delete this message?')) {
                const data = loadData();
                data.splice(index, 1);
                saveData(data);
                renderRows();
            }
        }

        formObj.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const now = new Date();
            const dateString = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

            const newItem = {
                to: document.getElementById('mTo').value,
                from: document.getElementById('mFrom').value,
                subject: document.getElementById('mSubject').value,
                body: document.getElementById('mBody').value,
                timestamp: dateString
            };

            const data = loadData();
            data.unshift(newItem); // Add to beginning
            saveData(data);
            renderRows();
            
            // reset form but keep sender info
            const fromVal = document.getElementById('mFrom').value;
            formObj.reset();
            document.getElementById('mFrom').value = fromVal;
            document.getElementById('mTo').focus();
        });

        // Init
        renderRows();
    </script>
</body>
</html>
