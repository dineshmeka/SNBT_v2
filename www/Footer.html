    <script>
        // Fix footer links for subfolders
        (function () {
            const isSubfolder = window.location.pathname.includes('/About/') ||
                window.location.pathname.includes('/Gallery/') ||
                window.location.pathname.includes('/Admissions/') ||
                window.location.pathname.includes('/Admin-staff/') ||
                window.location.pathname.includes('/Contact/') ||
                window.location.pathname.includes('/Results/') ||
                window.location.pathname.includes('/Student-services/') ||
                window.location.pathname.includes('/Staff-login/') ||
                window.location.pathname.includes('/Daily-attendance/') ||
                window.location.pathname.includes('/Internal-mail/') ||
                window.location.pathname.includes('/Publish-results/') ||
                window.location.pathname.includes('/Student-database/');

            if (isSubfolder) {
                const ul = document.getElementById('footer-ul-links');
                if (ul) {
                    const links = ul.querySelectorAll('a');
                    links.forEach(link => {
                        const href = link.getAttribute('href');
                        if (href && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('../')) {
                            link.setAttribute('href', '../' + href);
                        }
                    });
                }
                // Fix footer logo too
                const footerLogo = document.getElementById('footer-logo');
                if (footerLogo) {
                    const src = footerLogo.getAttribute('src');
                    if (src && !src.startsWith('http') && !src.startsWith('../')) {
                        footerLogo.setAttribute('src', '../' + src);
                    }
                }
            }
        })();
    </script>
